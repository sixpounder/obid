tag-prefix = "v"
sign-tag = true
push = true
sign-commit = true
push-remote = "origin"
publish = true
no-dev-version = false
pre-release-commit-message = "chore: release version {{version}}"
tag-message = "release {{version}}"

[[pre-release-replacements]]
file = "CHANGELOG.md"
search = "Unreleased"
replace = "{{version}}"

[[pre-release-replacements]]
file = "CHANGELOG.md"
search = '\\.\\.\\.HEAD'
replace = '...{{tag_name}}'
exactly = 1

[[pre-release-replacements]]
file = "CHANGELOG.md"
search = "ReleaseDate"
replace = "{{date}}"

[[pre-release-replacements]]
file = "CHANGELOG.md"
search = "<!-- next-header -->"
replace = "<!-- next-header -->\n\n## [Unreleased] - ReleaseDate"
exactly = 1

[[pre-release-replacements]]
file = "CHANGELOG.md"
search = "<!-- next-url -->"
replace = "<!-- next-url -->\n[Unreleased]: {{repository}}/compare/{{tag_name}}...HEAD"
exactly = 1
